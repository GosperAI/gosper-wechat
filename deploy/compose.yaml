services:
  gosper-wechat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - ../.env
    environment:
      GOSPER_WECHAT_BRIDGE_STATE_PATH: /data/gosper-wechat/state.json
      GOSPER_WECHAT_BRIDGE_HOST: 0.0.0.0
      GOSPER_WECHAT_BRIDGE_PORT: 8787
    volumes:
      - gosper-wechat-state:/data/gosper-wechat
    restart: unless-stopped

volumes:
  gosper-wechat-state:
